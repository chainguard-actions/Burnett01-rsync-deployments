name: Test basic rsync deployment inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          switches: -avzr --delete
          path: .
          remote_path: /tmp/deploy
          remote_host: 127.0.0.1
          remote_port: 22
          remote_user: testuser
          remote_key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            dGVzdGtleQ==
            -----END OPENSSH PRIVATE KEY-----
          remote_key_pass: ''
          strict_hostkeys_checking: 'false'
          debug: 'false'
      - name: Assert action ran (connection failure is expected)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail because there is no real SSH server.
          # We only verify that the action was invoked (outcome is set).
          if [ -z "${{ steps.action.outcome }}" ]; then
            echo "FAIL: action outcome was not set"
            exit 1
          fi
          echo "PASS: action was invoked with all required inputs"
