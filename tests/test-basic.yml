name: Test basic rsync deployment inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Generate dummy SSH key
        id: keygen
        run: |
          ssh-keygen -t rsa -b 2048 -f /tmp/test_key -N "" -q
          PRIVATE_KEY=$(cat /tmp/test_key)
          echo "private_key<<EOF" >> $GITHUB_OUTPUT
          echo "$PRIVATE_KEY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - id: action
        uses: .
        continue-on-error: true
        with:
          switches: '-avz --delete'
          path: '.'
          remote_path: '/tmp/deploy'
          remote_host: '127.0.0.1'
          remote_port: 22
          remote_user: 'testuser'
          remote_key: ${{ steps.keygen.outputs.private_key }}
      - name: Assert action ran (connection failure is expected)
        run: |
          echo "Action completed (connection failure is expected in test environment)"
          echo "All required inputs were accepted by the action"
          echo "PASS"
