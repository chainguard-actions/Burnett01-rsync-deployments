name: Test strict host key checking with unreachable host
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate a dummy SSH key for testing
        run: |
          ssh-keygen -t rsa -b 2048 -f /tmp/test_key -N "" -q
          echo "TEST_SSH_KEY<<EOF" >> $GITHUB_ENV
          cat /tmp/test_key >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - id: rsync
        name: Run rsync action with strict host key checking against unreachable host
        uses: .
        continue-on-error: true
        with:
          switches: -avz
          path: ''
          remote_path: /tmp/deploy
          remote_host: 192.0.2.1
          remote_port: 22
          remote_user: testuser
          remote_key: ${{ env.TEST_SSH_KEY }}
          strict_hostkeys_checking: 'true'
          debug: 'false'

      - name: Assert action failed due to unreachable host key fetch
        env:
          OUTCOME: ${{ steps.rsync.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when strict host key checking cannot fetch key, got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when strict host key checking cannot reach host"
